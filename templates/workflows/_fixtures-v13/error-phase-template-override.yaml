workflow: error-phase-template-override
version: 1
binds_to: quick
principles: []
defaults: {}
phases:
  - phase:
      id: plan
      description: plan
      role: planner
      prompt: Plan the change.

  - phase:
      id: execute
      description: execute
      template:
        name: docker-build
        args:
          image: api
      role: implementer
      prompt: this override should be rejected
      after: [ plan ]
