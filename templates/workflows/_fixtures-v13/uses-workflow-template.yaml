workflow: uses-workflow-template
version: 1
binds_to: quick
phases:
  - phase:
      id: plan
      description: plan
      role: planner
      prompt: "plan"
  - template:
      id: review
      name: review-and-address
      args:
        scope: auth
      after: [ plan ]
  - phase:
      id: execute
      description: execute
      role: implementer
      after: [ review ]
      prompt: "execute"
