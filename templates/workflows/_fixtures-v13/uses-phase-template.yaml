workflow: uses-phase-template
version: 1
binds_to: quick
principles: []
defaults: {}
phases:
  - phase:
      id: plan
      description: plan
      role: planner
      prompt: Plan the change.

  - phase:
      id: review-auth
      description: review-auth
      template:
        name: reviewer
        args:
          scope: auth
          min_findings: 1
      after: [ plan ]

  - phase:
      id: review-billing
      description: review-billing
      template:
        name: reviewer
        args:
          scope: billing
      after: [ plan ]
