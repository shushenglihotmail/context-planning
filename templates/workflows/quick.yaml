workflow: quick
version: 1
binds_to: quick
supervised: true
principles:
  - Agree on Approach + Done-When before writing code.
  - One atomic commit per task during execute.
  - Always close with a SUMMARY.md so the task is auditable.
defaults:
  model: default
params:
  - name: design_skill
    default: "plan"
  - name: design_role
    default: "tech-writer"
  - name: execute_skill
    default: "execute"
  - name: execute_role
    default: "developer"
phases:
  - phase:
      id: setup
      description: |
        Generate slug from task description, create
        .planning/quick/<date>-<slug>/ dir, scaffold DESIGN.md and
        STATE.md.
      kind: scaffold
      command: "cp quick-setup --task '{{task_description}}'"
  - phase:
      id: design
      description: |
        Discuss the task with the user, agree on Approach + Done-When,
        write into DESIGN.md, set status=ready.

        STOP. Do not start implementation. Wait for the user to
        explicitly confirm DESIGN.md (Approach + Done-When) before
        marking this phase complete. A brief task description from the
        user is NOT confirmation — ask follow-up questions until the
        scope is unambiguous, then have the user confirm.
      depends_on: [ setup ]
      role: "{{design_role}}"
      skill: "{{design_skill}}"
      outputs:
        - ".planning/quick/{{slug_with_date}}/DESIGN.md"
      prompt: |
        Open the task's DESIGN.md (at
        .planning/quick/{{slug_with_date}}/DESIGN.md) and work with the
        user to fill in: Approach (what will change and how) and
        Done-When (observable criteria that say it's finished).

        STOP. Do NOT start implementation. The user's task description
        is a starting point, NOT a green light. Ask focused follow-up
        questions until both Approach and Done-When are unambiguous,
        write them into DESIGN.md, then wait for the user to explicitly
        confirm DESIGN.md before marking this phase complete.

        Mark status=ready in DESIGN.md only AFTER user confirmation.
  - phase:
      id: execute
      description: |
        Implement the agreed change. Commit atomically per task; append
        progress to STATE.md.
      depends_on: [ design ]
      role: "{{execute_role}}"
      skill: "{{execute_skill}}"
      outputs:
        - "**/*"
      prompt: |
        Implement the change agreed in DESIGN.md (at
        .planning/quick/{{slug_with_date}}/DESIGN.md). Commit atomically
        per task; append progress notes to STATE.md as you go. Do not
        proceed past Done-When without verifying each criterion.
  - phase:
      id: finalize
      description: |
        Write SUMMARY.md, set status=complete, append row to project
        STATE.md Quick Tasks Completed table.
      depends_on: [ execute ]
      kind: scaffold
      command: "cp quick-finalize {{slug_with_date}}"

