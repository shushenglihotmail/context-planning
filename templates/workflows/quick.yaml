workflow: quick
version: 1
binds_to: quick
principles:
  - Discuss before acting — align on scope and approach first.
  - Verify before closing — confirm the change behaves as expected.
defaults:
  model: default
phases:
  - id: discuss
    role: planner
    prompt: |
      Discuss and clarify the requested change.
      - Understand the goal and any constraints.
      - Agree on the approach and scope (no implementation yet).
      - Identify any risks or unknowns worth noting.

  - id: execute
    depends_on: [discuss]
    role: implementer
    prompt: |
      Implement the change agreed in the discuss phase.
      - Make the smallest correct change that satisfies the goal.
      - Commit atomically with a clear message.

  - id: verify
    depends_on: [execute]
    role: verifier
    prompt: |
      Verify the change is correct and complete.
      - Run relevant tests (or manual checks if no automated tests exist).
      - Confirm the original goal is satisfied.
      - Flag anything that should be followed up.
