workflow: milestone
version: 1
binds_to: milestone
supervised: true
principles:
  - Brainstorm scope with the user before locking the milestone goal.
  - Reflect requirement changes into PROJECT.md before phase breakdown.
  - End with a clean STATE.md banner naming the active milestone.
defaults:
  model: default
params:
  - name: brainstorm_skill
    default: "brainstorm"
  - name: brainstorm_role
    default: "product-thinker"
  - name: plan_skill
    default: "plan"
  - name: plan_role
    default: "developer"
  # Supervisor-supplied (no default): injected at run-time by the
  # /cp-new-milestone skill.
  - name: milestone_slug
phases:
  - phase:
      id: setup
      description: |
        Validate prerequisites (PROJECT.md exists), resolve milestone
        name, run cp doctor.
      kind: scaffold
      command: "cp milestone-setup-check {{milestone_slug}}"
  - phase:
      id: brainstorm
      description: |
        Brainstorm milestone scope conversationally with the user.
        Produces DESIGN.md and MILESTONE-CONTEXT.md.
      depends_on: [ setup ]
      role: "{{brainstorm_role}}"
      skill: "{{brainstorm_skill}}"
      outputs:
        - ".planning/milestones/{{milestone_slug}}/DESIGN.md"
        - ".planning/MILESTONE-CONTEXT.md"
      prompt: |
        Brainstorm the milestone scope with the user. Probe goals,
        non-goals, and constraints; surface trade-offs. Write the
        results into
        .planning/milestones/{{milestone_slug}}/DESIGN.md and into
        .planning/MILESTONE-CONTEXT.md.

        Do not lock scope without the user's explicit agreement.
  - phase:
      id: propose-project-updates
      description: |
        Propose updates to PROJECT.md from the brainstorm: which
        requirements move to validated, which become active.
      depends_on: [ brainstorm ]
      role: "{{plan_role}}"
      skill: "{{plan_skill}}"
      outputs:
        - ".planning/milestones/{{milestone_slug}}/project-update.json"
      prompt: |
        Read the brainstorm output and propose a JSON patch for
        PROJECT.md: which requirements move to validated, which become
        active, which are deferred. Write
        .planning/milestones/{{milestone_slug}}/project-update.json.
  - phase:
      id: apply-project-updates
      description: |
        Apply the proposed PROJECT.md mutations (idempotent).
      depends_on: [ propose-project-updates ]
      kind: scaffold
      command: "cp project update --from .planning/milestones/{{milestone_slug}}/project-update.json"
  - phase:
      id: propose-phases
      description: |
        Decompose milestone into 2-10 phases for ROADMAP.md.
      depends_on: [ apply-project-updates ]
      role: "{{plan_role}}"
      skill: "{{plan_skill}}"
      materialize: roadmap-phases
      max_children: 10
      prompt: |
        Decompose this milestone into 2-10 phases for ROADMAP.md. Each
        phase must have a unique slug-safe id, a short title, an
        optional summary, and a depends_on list (may be empty). Aim for
        phases that are independently shippable.
  - phase:
      id: finalize
      description: |
        Update project STATE.md (current focus, phase counter), print
        next-step banner.
      depends_on: [ propose-phases ]
      kind: scaffold
      command: "cp milestone-finalize {{milestone_slug}}"

