workflow: dev
version: 1
binds_to: milestone
principles:
  - Decompose before designing — plan phase enumerates sub-features the agent must implement.
  - Per-feature plan→execute pairs run as a fan-out of the plan phase.
  - Cross-feature ordering is opt-in via per-item depends_on (all-or-nothing).
defaults:
  model: default
phases:
  - id: plan
    role: planner
    skill: writing-plans
    max_children: 10
    min_children: 1
    prompt: |
      Decompose this milestone into 1-10 sub-features. Each sub-feature must
      have a unique slug-safe id, a short title, and an optional summary.

      If you can identify dependency relationships between the sub-features
      (e.g. feature B builds on feature A and cannot start until A's work is
      complete), declare them via the per-item `depends_on` field — but only
      if you populate `depends_on` on EVERY item (use [] for items with no
      deps). Partial declarations are ignored and the runtime falls back to
      sequential array order.

  - id: child-plan
    parent: plan
    role: planner
    skill: writing-plans
    prompt: |
      Produce a detailed implementation plan for this sub-feature.

  - id: child-execute
    parent: plan
    after: [child-plan]
    role: implementer
    skill: subagent-driven-development
    prompt: |
      Execute the sub-feature plan; commit atomically per task.
