name: review-and-address
params:
  - name: scope
phases:
  - phase:
      id: review
      description: "review-{{scope}}"
      role: reviewer
      skill: code-review
      prompt: "Review {{scope}} against the milestone goal."
  - phase:
      id: address
      description: "address-{{scope}}"
      role: implementer
      after: [ "review" ]
      prompt: "Address review comments on {{scope}}."
