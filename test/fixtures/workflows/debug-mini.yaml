workflow: debug-mini
version: 1
binds_to: custom
principles:
  - "Reproduce before fixing"
phases:
  - phase:
      id: collect-symptoms
      description: collect-symptoms
      role: investigator
      prompt: |
        Collect symptoms.
  - phase:
      id: repro
      description: repro
      depends_on: [ collect-symptoms ]
      role: investigator
      prompt: |
        Build a minimal reproduction.
  - phase:
      id: fix
      description: fix
      depends_on: [ repro ]
      role: implementer
      prompt: |
        Apply the fix.
  - phase:
      id: verify
      description: verify
      depends_on: [ fix ]
      role: verifier
      prompt: |
        Verify the fix holds.
