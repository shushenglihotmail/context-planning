workflow: dev-mini
version: 1
binds_to: milestone
principles:
  - "Don't commit until confirmed with user"
  - "Try to run autonomously until hitting a blocker"
defaults:
  model: middle
params:
  # Supervisor-supplied (no default): injected at run-time.
  - name: milestone_slug
phases:
  - phase:
      id: brainstorm
      description: brainstorm
      role: brainstormer
      model: high
      skill: brainstorming
      persist_output: true
      prompt: |
        Brainstorm the problem space.
  - phase:
      id: research-a
      description: research-a
      depends_on: [ brainstorm ]
      role: researcher
      prompt: |
        Research angle A.
  - phase:
      id: research-b
      description: research-b
      depends_on: [ brainstorm ]
      role: researcher
      prompt: |
        Research angle B.
  - phase:
      id: plan
      description: plan
      depends_on: [ research-a, research-b ]
      role: planner
      skill: writing-plans
      prompt: |
        Synthesize a plan.
  - phase:
      id: execute
      description: execute
      depends_on: [ plan ]
      role: implementer
      skill: executing-plans
      prompt: |
        Execute the plan.
  - phase:
      id: finalize
      description: finalize
      depends_on: [ execute ]
      kind: scaffold
      command: cp milestone-finalize {{milestone_slug}}
