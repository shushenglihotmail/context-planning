workflow: quick-mini
version: 1
binds_to: quick
phases:
  - phase:
      id: discuss
      description: discuss
      prompt: |
        Discuss the change.
  - phase:
      id: execute
      description: execute
      depends_on: [ discuss ]
      prompt: |
        Make the change.
  - phase:
      id: verify
      description: verify
      depends_on: [ execute ]
      prompt: |
        Verify.
