workflow: quick-mini
version: 1
binds_to: quick
params:
  # Supervisor-supplied (no default): injected at run-time.
  - name: slug_with_date
phases:
  - phase:
      id: discuss
      description: discuss
      prompt: |
        Discuss the change.
  - phase:
      id: execute
      description: execute
      depends_on: [ discuss ]
      prompt: |
        Make the change.
  - phase:
      id: verify
      description: verify
      depends_on: [ execute ]
      prompt: |
        Verify.
  - phase:
      id: finalize
      description: finalize
      depends_on: [ verify ]
      kind: scaffold
      command: cp quick-finalize {{slug_with_date}}
