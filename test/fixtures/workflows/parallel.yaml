workflow: parallel
version: 1
binds_to: phase
phases:
  - phase:
      id: discuss
      description: discuss
      role: facilitator
      prompt: Discuss requirements
  - phase:
      id: research-a
      description: research-a
      depends_on: [ discuss ]
      role: researcher
      prompt: Research track A
  - phase:
      id: research-b
      description: research-b
      depends_on: [ discuss ]
      role: researcher
      prompt: Research track B
  - phase:
      id: execute
      description: execute
      depends_on: [ research-a, research-b ]
      role: executor
      prompt: Execute
