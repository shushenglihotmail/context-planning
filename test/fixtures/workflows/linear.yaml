workflow: linear
version: 1
binds_to: custom
principles:
  - Keep it simple
  - One thing at a time
defaults:
  model: default
phases:
  - phase:
      id: brainstorm
      description: brainstorm
      role: researcher
      prompt: Brainstorm ideas
  - phase:
      id: plan
      description: plan
      depends_on: [ brainstorm ]
      role: planner
      prompt: Create the plan
  - phase:
      id: execute
      description: execute
      depends_on: [ plan ]
      role: executor
      prompt: Execute the plan
